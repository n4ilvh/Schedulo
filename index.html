<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Schedulo</title>
</head>
<body>
    <div class="title">Schedulo</div>
    <div class="container">
        <div class="upper" id="upper">
            <div class="upload-container">
                <input type="file" id="file-upload" name="timetable" accept="image/*" hidden />
                <label for="file-upload" class="file-button">Upload Timetable Image</label>
            </div>
            <button class="button">Parse Timetable</button>
        </div>
        <div class="middle" id="middle">
        
            
        </div>
<div class="edit" id="edit">
    <div class="date-group">
        <label for="first-class">First Day of Classes</label>
        <input type="date" id="first-class" class="date-input">
    </div>
    
    <div class="date-group">
        <label for="last-class">Last Day of Classes</label>
        <input type="date" id="last-class" class="date-input">
    </div>

    <div class="breaks-section">
        <button type="button" id="add-break-btn" class="add-button">+ Add Break Range</button>
        <div id="breaks-container" style="background-color: red; gap: 10px;"></div>
    </div>
</div>
        <div class="bottom">
            <div class="image-box" id="image-box">
                <div class="img-container">
                    <img src="">
                </div>
            </div>

            <div id="calendar-grid" class="calendar-grid">
                <!-- <div class="day-column">Monday</div> -->
            </div>
        </div>
    </div>
<script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
<script src="script.js"></script>

</body>
</html>
